          - not_null
      - name: total_sog_per_game_rank
        data_tests:
          - not_null
      - name: sog_against_per_game
        data_tests:
          - not_null
      - name: sog_against_per_game_rank
        data_tests:
          - not_null
      - name: sog_for_per_game
        data_tests:
          - not_null
      - name: sog_for_per_game_rank
        data_tests:
          - not_null

